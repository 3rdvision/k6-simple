services:
  webtest:
    image: nginx:alpine
    container_name: webtest
    ports:
      - "8080:80"
    # Everything is self-contained here: the vhost config and the test payload
    # are written at container start, so no extra files need to live on disk.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # --- nginx vhost: gzip level 9 on a big, barely-compressible payload.
        #     Static serving is nearly free, so gzip is the CPU-cost knob that
        #     lets a CPU-capped nginx reach 100% and start dropping connections.
        #     backlog=64 keeps the accept queue small so overflow connections drop.
        cat > /etc/nginx/conf.d/default.conf <<'CONF'
        server {
            listen 80 backlog=64;
            server_name _;

            gzip on;
            gzip_comp_level 9;
            gzip_min_length 0;
            gzip_types *;
            gzip_proxied any;

            root /usr/share/nginx/html;

            location / {
                try_files /payload.html =404;
                add_header X-Service "webtest" always;
            }

            location = /healthz {
                gzip off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }
        }
        CONF
        # --- generate a ~256KB incompressible payload at startup ---
        {
          printf '<!doctype html><html><body><pre>'
          head -c 196608 /dev/urandom | base64
          printf '</pre></body></html>'
        } > /usr/share/nginx/html/payload.html
        exec nginx -g 'daemon off;'
    # Hard CPU cap so the service can realistically be pushed to 100%.
    # 1.0 == one full core, so `docker stats` reading ~100% == the cap is maxed.
    cpus: "1.0"
    mem_limit: "128m"
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 3s
